name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  rust:
    name: rust (${{ matrix.os }}, ${{ matrix.toolchain }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            toolchain: stable
          - os: macos-latest
            toolchain: stable
          - os: windows-latest
            toolchain: stable
          - os: ubuntu-latest
            toolchain: 1.85.0
    steps:
      - uses: actions/checkout@v6
      - run: rustup toolchain install ${{ matrix.toolchain }} --profile minimal --component clippy,rustfmt
      - run: rustup default ${{ matrix.toolchain }}
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --locked
      - run: cargo package --locked
