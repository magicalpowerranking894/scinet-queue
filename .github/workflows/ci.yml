name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
  merge_group:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  rust:
    name: rust (${{ matrix.os }}, ${{ matrix.toolchain }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            toolchain: stable
          - os: macos-latest
            toolchain: stable
          - os: windows-latest
            toolchain: stable
          - os: ubuntu-latest
            toolchain: 1.85.0
    steps:
      - uses: actions/checkout@v6
      - run: rustup toolchain install ${{ matrix.toolchain }} --profile minimal --component clippy,rustfmt
      - run: rustup default ${{ matrix.toolchain }}
      - if: matrix.os == 'ubuntu-latest' && matrix.toolchain == 'stable'
        run: cargo fmt --all --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --locked
      - if: matrix.os == 'ubuntu-latest' && matrix.toolchain == 'stable'
        run: cargo package --locked
