name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar
          - os: macos-15-intel
            target: x86_64-apple-darwin
            archive: tar
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    env:
      TAG: ${{ inputs.tag || github.ref_name }}
      TARGET: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - run: rustup toolchain install stable --profile minimal
      - run: rustup default stable
      - run: rustup target add ${{ matrix.target }}

      - name: Validate tag version
        shell: bash
        run: |
          set -euo pipefail
          version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n1)"
          test "$TAG" = "v${version}"

      - run: cargo test --locked
      - run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package Unix archive
        if: matrix.archive == 'tar'
        shell: bash
        run: |
          set -euo pipefail
          asset="snq-${TAG}-${TARGET}.tar.gz"
          stage="target/release-package/snq-${TAG}-${TARGET}"

          mkdir -p "$stage"
          cp "target/${TARGET}/release/snq" "$stage/"
          cp README.md LICENSE CHANGELOG.md "$stage/"
          tar -czf "$asset" -C "$stage" .

      - name: Smoke Unix archive
        if: matrix.archive == 'tar'
        shell: bash
        run: |
          set -euo pipefail
          asset="snq-${TAG}-${TARGET}.tar.gz"
          smoke="$(mktemp -d)"
          workspace="${smoke}/workspace"
          home="${smoke}/home"

          mkdir -p "$workspace" "$home"
          tar -xzf "$asset" -C "$smoke"
          test -x "${smoke}/snq"
          test -f "${smoke}/README.md"
          test -f "${smoke}/LICENSE"
          test -f "${smoke}/CHANGELOG.md"
          HOME="$home" "${smoke}/snq" --version | grep -Fx "snq ${TAG#v}"
          HOME="$home" "${smoke}/snq" --help | grep -F "snq balance [--json]"
          (
            cd "$workspace"
            HOME="$home" "${smoke}/snq" url '10.1016/s0272-5231(21)01013-3' \
              | grep -Fx 'https://sci-net.xyz/10.1016/s0272-5231%2821%2901013-3'
            HOME="$home" "${smoke}/snq" list --json | grep -Fx '[]'
          )

      - name: Package Windows archive
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $asset = "snq-$($env:TAG)-$($env:TARGET).zip"
          $stage = "target\release-package\snq-$($env:TAG)-$($env:TARGET)"

          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "target\$($env:TARGET)\release\snq.exe" $stage
          Copy-Item README.md, LICENSE, CHANGELOG.md $stage
          Compress-Archive -Path "$stage\*" -DestinationPath $asset -Force

      - name: Smoke Windows archive
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $asset = "snq-$($env:TAG)-$($env:TARGET).zip"
          $smoke = Join-Path $env:RUNNER_TEMP "snq-smoke-$($env:TARGET)"
          $smokeHome = Join-Path $smoke "home"
          $workspace = Join-Path $smoke "workspace"

          New-Item -ItemType Directory -Force -Path $smoke, $smokeHome, $workspace | Out-Null
          Expand-Archive -Path $asset -DestinationPath $smoke -Force
          if (!(Test-Path (Join-Path $smoke "snq.exe"))) { throw "snq.exe missing" }
          if (!(Test-Path (Join-Path $smoke "README.md"))) { throw "README.md missing" }
          if (!(Test-Path (Join-Path $smoke "LICENSE"))) { throw "LICENSE missing" }
          if (!(Test-Path (Join-Path $smoke "CHANGELOG.md"))) { throw "CHANGELOG.md missing" }

          $env:HOME = $smokeHome
          $env:USERPROFILE = $smokeHome
          $snq = Join-Path $smoke "snq.exe"

          if ((& $snq --version) -ne "snq $($env:TAG.TrimStart('v'))") { throw "version smoke failed" }
          if (!((& $snq --help) -match "snq balance \[--json\]")) { throw "help smoke failed" }
          Set-Location $workspace
          if ((& $snq url '10.1016/s0272-5231(21)01013-3') -ne 'https://sci-net.xyz/10.1016/s0272-5231%2821%2901013-3') { throw "url smoke failed" }
          if ((& $snq list --json) -ne '[]') { throw "list smoke failed" }

      - uses: actions/upload-artifact@v7
        with:
          name: snq-${{ env.TAG }}-${{ matrix.target }}
          path: snq-${{ env.TAG }}-${{ matrix.target }}.*
          if-no-files-found: error

  publish:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: .github/release-notes.md
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum snq-"${TAG}"-* > SHA256SUMS

      - name: Publish GitHub release
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
            gh release edit "$TAG" \
              --title "$TAG" \
              --notes-file .github/release-notes.md \
              --latest
          else
            gh release create "$TAG" dist/* \
              --title "$TAG" \
              --notes-file .github/release-notes.md \
              --latest \
              --verify-tag
          fi
